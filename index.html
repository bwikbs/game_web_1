<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹크래프트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100%; height: 100%; }
    canvas { display: block; }

    /* 크로스헤어 */
    #crosshair {
      position: fixed; left: 50%; top: 50%;
      width: 20px; height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 10;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.85);
      mix-blend-mode: difference;
    }
    #crosshair::before { left: 9px; top: 0; width: 2px; height: 20px; }
    #crosshair::after { left: 0; top: 9px; width: 20px; height: 2px; }

    /* 핫바 */
    #hotbar {
      position: fixed; left: 50%; bottom: 16px;
      transform: translateX(-50%);
      display: flex; gap: 4px; z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 4px; border-radius: 6px;
    }
    .slot {
      position: relative; width: 48px; height: 48px;
      border: 2px solid rgba(255,255,255,0.35); border-radius: 4px;
      background: rgba(0,0,0,0.3);
    }
    .slot.selected { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.7); }
    .slot img { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
    .slot .num {
      position: absolute; left: 3px; top: 1px;
      font: bold 11px monospace; color: #fff; text-shadow: 1px 1px 0 #000;
    }
    #block-name {
      position: fixed; left: 50%; bottom: 80px;
      transform: translateX(-50%);
      color: #fff; font: bold 18px sans-serif;
      text-shadow: 1px 1px 2px #000;
      opacity: 0; transition: opacity 0.4s; z-index: 10;
      pointer-events: none;
    }

    /* HUD */
    #hud {
      position: fixed; left: 10px; top: 10px; z-index: 10;
      color: #fff; font: 13px monospace;
      text-shadow: 1px 1px 0 #000; pointer-events: none;
    }

    /* 시작 오버레이 */
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(10, 20, 40, 0.65);
      color: #fff; cursor: pointer; text-align: center;
      backdrop-filter: blur(3px);
    }
    #overlay h1 {
      font: bold 44px 'Segoe UI', sans-serif;
      letter-spacing: 2px; margin-bottom: 8px;
      text-shadow: 3px 3px 0 #2a5d1e;
    }
    #overlay p { font: 15px sans-serif; line-height: 1.9; opacity: 0.9; }
    #overlay .start {
      margin-top: 24px; padding: 12px 36px;
      background: #4caf50; border-radius: 8px;
      font: bold 18px sans-serif;
      box-shadow: 0 4px 0 #2a5d1e;
    }
    #new-game {
      margin-top: 14px; padding: 8px 20px;
      font: 13px sans-serif; color: #ffb0b0;
      border: 1px solid rgba(255,150,150,0.4); border-radius: 6px;
    }
    #new-game:hover { background: rgba(255,100,100,0.2); }
    kbd {
      background: rgba(255,255,255,0.15); border-radius: 4px;
      padding: 1px 7px; font-family: monospace;
      border: 1px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="crosshair"></div>
  <div id="hud">
    <div id="fps"></div>
    <div id="pos"></div>
    <div id="online"></div>
  </div>
  <div id="block-name"></div>
  <div id="hotbar"></div>
  <div id="overlay">
    <h1>⛏ 웹크래프트</h1>
    <p>
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 이동 &nbsp;·&nbsp;
      <kbd>Space</kbd> 점프/수영 &nbsp;·&nbsp; <kbd>Shift</kbd> 달리기<br>
      <kbd>좌클릭</kbd> 블록 캐기 &nbsp;·&nbsp; <kbd>우클릭</kbd> 블록 설치<br>
      <kbd>1~9</kbd> / 마우스 휠 : 블록 선택 &nbsp;·&nbsp; <kbd>ESC</kbd> 일시정지
    </p>
    <div class="start">클릭해서 시작</div>
    <div id="new-game">🗑 새 게임 (저장 삭제)</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
